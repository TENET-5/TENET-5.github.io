name: Instagram Campaign — Daily Post

on:
  schedule:
    # Posts at 9:00 AM Eastern (14:00 UTC) every day
    - cron: '0 14 * * *'
  workflow_dispatch:
    # Allow manual trigger from GitHub Actions tab
    inputs:
      force_post_number:
        description: 'Force a specific post number (1-30), leave blank for next in sequence'
        required: false
        type: string

jobs:
  post-to-instagram:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Post to Instagram
        env:
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_ACCOUNT_ID: ${{ secrets.IG_ACCOUNT_ID }}
          FORCE_POST_NUMBER: ${{ inputs.force_post_number }}
        run: python tools/instagram_post_action.py
