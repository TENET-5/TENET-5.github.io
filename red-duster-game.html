<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RED DUSTER: FRONTLINE — Defend Maplewood</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;font-family:'Segoe UI',sans-serif;cursor:none}
canvas{display:block}

/* Blocker / Start Screen */
#blocker{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,0.92);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer}
#blocker h1{font-size:4rem;color:#c41e3a;letter-spacing:8px;text-shadow:0 0 60px rgba(196,30,58,0.6);margin-bottom:0.3rem}
#blocker .sub{color:#666;font-size:1rem;font-style:italic;margin-bottom:2rem}
#blocker .play{background:#c41e3a;color:#fff;border:none;padding:1rem 3rem;font-size:1.3rem;font-weight:700;border-radius:8px;cursor:pointer;letter-spacing:3px;transition:all 0.2s}
#blocker .play:hover{background:#e53555;transform:scale(1.05);box-shadow:0 0 40px rgba(196,30,58,0.5)}
#blocker .keys{color:#555;font-size:0.78rem;margin-top:2rem;text-align:center;line-height:2.2}
#blocker kbd{background:#222;padding:2px 8px;border-radius:4px;color:#ccc;font-family:monospace}

/* HUD */
#hud{position:fixed;z-index:50;pointer-events:none;font-family:'JetBrains Mono','Courier New',monospace}
#hud-health{position:fixed;bottom:20px;left:20px;z-index:50}
#hud-health .bar{width:200px;height:6px;background:#333;border-radius:3px;overflow:hidden}
#hud-health .fill{height:100%;background:#22c55e;transition:width 0.2s;border-radius:3px}
#hud-health .label{font-size:0.65rem;color:#888;letter-spacing:2px;margin-bottom:4px}
#hud-health .val{font-size:1.6rem;color:#22c55e;font-weight:700}

#hud-ammo{position:fixed;bottom:20px;right:20px;z-index:50;text-align:right}
#hud-ammo .val{font-size:2rem;color:#fbbf24;font-weight:700}
#hud-ammo .label{font-size:0.65rem;color:#888;letter-spacing:2px}
#hud-ammo .weapon-name{font-size:0.75rem;color:#555;margin-top:2px}

#hud-wave{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:50;text-align:center}
#hud-wave .val{font-size:1.2rem;color:#c41e3a;font-weight:700;letter-spacing:3px}
#hud-wave .score{font-size:0.8rem;color:#a855f7;margin-top:4px}

#hud-kills{position:fixed;top:20px;right:20px;z-index:50;text-align:right}
#hud-kills .val{font-size:1.4rem;color:#ff6b6b;font-weight:700}
#hud-kills .label{font-size:0.6rem;color:#888;letter-spacing:2px}

/* Crosshair */
#crosshair{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:51;pointer-events:none;width:24px;height:24px}
#crosshair::before,#crosshair::after{content:'';position:absolute;background:rgba(255,255,255,0.6)}
#crosshair::before{width:2px;height:24px;left:11px;top:0}
#crosshair::after{width:24px;height:2px;left:0;top:11px}
#crosshair .dot{position:absolute;width:4px;height:4px;background:#c41e3a;border-radius:50%;top:10px;left:10px}

/* Damage flash */
#damage{position:fixed;inset:0;z-index:49;pointer-events:none;background:radial-gradient(ellipse,transparent 40%,rgba(139,0,0,0.5) 100%);opacity:0;transition:opacity 0.1s}

/* Kill feed */
#killfeed{position:fixed;top:60px;right:20px;z-index:50;pointer-events:none;display:flex;flex-direction:column;gap:4px;align-items:flex-end}
.kill-msg{background:rgba(196,30,58,0.15);border:1px solid rgba(196,30,58,0.3);color:#ff6b6b;padding:4px 12px;border-radius:4px;font-size:0.72rem;font-family:monospace;animation:killIn 0.3s ease both;white-space:nowrap}
@keyframes killIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}

/* Wave banner */
#wave-banner{position:fixed;top:35%;left:50%;transform:translateX(-50%);z-index:52;pointer-events:none;text-align:center;opacity:0;transition:opacity 0.5s}
#wave-banner h2{font-size:3.5rem;color:#c41e3a;text-shadow:0 0 60px rgba(196,30,58,0.4);letter-spacing:6px}
#wave-banner p{color:#888;font-size:1rem;margin-top:0.5rem}

/* Game Over */
#gameover{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,0.95);display:none;flex-direction:column;align-items:center;justify-content:center;color:#fff}
#gameover h1{font-size:4rem;color:#c41e3a;margin-bottom:1rem}
#gameover .stats{color:#888;font-size:1.1rem;line-height:2.2;text-align:center;margin-bottom:2rem}
#gameover .restart{background:#c41e3a;color:#fff;border:none;padding:1rem 3rem;font-size:1.2rem;font-weight:700;border-radius:8px;cursor:pointer;letter-spacing:2px}
</style>
</head>
<body>

<div id="blocker">
  <h1>RED DUSTER</h1>
  <div class="sub">"He built a machine instead."</div>
  <button class="play" onclick="startGame()">ENGAGE</button>
  <div class="keys">
    <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> Move &nbsp;|&nbsp;
    <kbd>Mouse</kbd> Aim &nbsp;|&nbsp;
    <kbd>Click</kbd> Fire &nbsp;|&nbsp;
    <kbd>R</kbd> Reload &nbsp;|&nbsp;
    <kbd>1</kbd><kbd>2</kbd><kbd>3</kbd> Weapons &nbsp;|&nbsp;
    <kbd>Space</kbd> Jump
  </div>
</div>

<div id="crosshair"><div class="dot"></div></div>
<div id="damage"></div>
<div id="killfeed"></div>
<div id="wave-banner"><h2></h2><p></p></div>

<div id="hud-health" style="pointer-events:none;font-family:'JetBrains Mono',monospace">
  <div class="label">HEALTH</div>
  <div class="val" id="hp-val">100</div>
  <div class="bar"><div class="fill" id="hp-bar" style="width:100%"></div></div>
</div>

<div id="hud-ammo" style="pointer-events:none;font-family:'JetBrains Mono',monospace">
  <div class="weapon-name" id="wep-name">C7A2 RIFLE</div>
  <div class="val"><span id="ammo-val">30</span> <span style="color:#666;font-size:1rem">/ <span id="ammo-reserve">120</span></span></div>
  <div class="label">AMMUNITION</div>
</div>

<div id="hud-wave" style="pointer-events:none;font-family:'JetBrains Mono',monospace">
  <div class="val">WAVE <span id="wave-val">1</span></div>
  <div class="score">SCORE: <span id="score-val">0</span></div>
</div>

<div id="hud-kills" style="pointer-events:none;font-family:'JetBrains Mono',monospace">
  <div class="label">TREASON LIQUIDATED</div>
  <div class="val" id="kills-val">0</div>
</div>

<div id="gameover">
  <h1>MISSION COMPLETE</h1>
  <div class="stats" id="go-stats"></div>
  <button class="restart" onclick="location.reload()">REDEPLOY</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/PointerLockControls.js"></script>
<script>
// ═══════════════════════════════════════════════════════════
// RED DUSTER: FRONTLINE v2.0 — Three.js FPS Engine
// ═══════════════════════════════════════════════════════════

// ── Audio Engine (Web Audio API) ─────────────────────────
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx;
function initAudio() { if (!audioCtx) audioCtx = new AudioCtx(); }

function playSound(freq, dur, type, vol) {
  if (!audioCtx) return;
  const g = audioCtx.createGain();
  const o = audioCtx.createOscillator();
  o.type = type || 'square';
  o.frequency.setValueAtTime(freq, audioCtx.currentTime);
  o.frequency.exponentialRampToValueAtTime(freq * 0.3, audioCtx.currentTime + dur);
  g.gain.setValueAtTime(vol || 0.15, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(); o.stop(audioCtx.currentTime + dur);
}

function sfxShoot() { playSound(800, 0.08, 'sawtooth', 0.2); playSound(200, 0.12, 'square', 0.15); }
function sfxHit() { playSound(300, 0.15, 'square', 0.2); playSound(100, 0.2, 'sawtooth', 0.1); }
function sfxDamage() { playSound(150, 0.3, 'sawtooth', 0.25); }
function sfxReload() { playSound(600, 0.05, 'square', 0.1); setTimeout(() => playSound(900, 0.05, 'square', 0.1), 150); }
function sfxWave() { playSound(440, 0.3, 'sine', 0.15); setTimeout(() => playSound(660, 0.3, 'sine', 0.15), 200); setTimeout(() => playSound(880, 0.4, 'sine', 0.2), 400); }

// ── Weapons ──────────────────────────────────────────────
const WEAPONS = [
  { name: 'C7A2 RIFLE', mag: 30, reserve: 120, fireRate: 0.1, damage: 25, spread: 0.02, projSpeed: 200, projColor: 0xffaa00, auto: true },
  { name: 'BROWNING HP', mag: 13, reserve: 52, fireRate: 0.2, damage: 40, spread: 0.04, projSpeed: 180, projColor: 0xff6600, auto: false },
  { name: 'C9A2 LMG', mag: 100, reserve: 200, fireRate: 0.07, damage: 20, spread: 0.05, projSpeed: 220, projColor: 0xff0000, auto: true },
];

// ── Game State ───────────────────────────────────────────
let camera, scene, renderer, controls;
let playing = false;
let health = 100, score = 0, kills = 0, wave = 1;
let curWeapon = 0, ammo, reserve;
let lastFire = 0, mouseDown = false, reloading = false;

const velocity = new THREE.Vector3();
const direction = new THREE.Vector3();
let moveF = false, moveB = false, moveL = false, moveR = false, canJump = false;
let prevTime = 0;

const projectiles = [];
const enemies = [];
const particles = [];
const buildings = [];

const KILL_MESSAGES = [
  's.504 ENFORCED', 'TREASON LIQUIDATED', 'SUBPOENA DELIVERED',
  'WARRANT SERVED', 'ACCOUNTABILITY APPLIED', 'JUSTICE DISPATCHED',
  'BUREAUCRAT NEUTRALIZED', 'DISCLOSURE FORCED', 'CORRUPTION PURGED',
  'RED DUSTER JUSTICE', 'STINCHCOMBE DELIVERED', 'COVEY PROTOCOL ENGAGED'
];

// ── Init ─────────────────────────────────────────────────
function initGame() {
  // Scene
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x1a0a0e);
  scene.fog = new THREE.FogExp2(0x1a0a0e, 0.008);

  // Camera
  camera = new THREE.PerspectiveCamera(80, innerWidth / innerHeight, 0.1, 500);

  // Renderer
  renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer.setSize(innerWidth, innerHeight);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 0.8;
  document.body.appendChild(renderer.domElement);

  // Lighting — dramatic, cinematic
  const ambient = new THREE.AmbientLight(0x221111, 0.3);
  scene.add(ambient);

  const moon = new THREE.DirectionalLight(0x6688cc, 0.4);
  moon.position.set(50, 80, -30);
  moon.castShadow = true;
  moon.shadow.mapSize.set(2048, 2048);
  moon.shadow.camera.near = 1; moon.shadow.camera.far = 300;
  moon.shadow.camera.left = -100; moon.shadow.camera.right = 100;
  moon.shadow.camera.top = 100; moon.shadow.camera.bottom = -100;
  scene.add(moon);

  // Red emergency light
  const redLight = new THREE.PointLight(0xff2244, 1.5, 80);
  redLight.position.set(0, 15, 0);
  scene.add(redLight);

  // Flickering fire lights
  for (let i = 0; i < 6; i++) {
    const fire = new THREE.PointLight(0xff6622, 0.8, 40);
    fire.position.set((Math.random() - 0.5) * 200, 8, (Math.random() - 0.5) * 200);
    fire._baseIntensity = 0.5 + Math.random() * 0.5;
    fire._phase = Math.random() * Math.PI * 2;
    scene.add(fire);
  }

  // Controls
  controls = new THREE.PointerLockControls(camera, document.body);
  scene.add(controls.getObject());

  // ── Level Geometry ──────────────────────────────────────
  buildLevel();

  // ── Skybox (gradient) ──────────────────────────────────
  const skyGeo = new THREE.SphereGeometry(400, 32, 32);
  const skyMat = new THREE.ShaderMaterial({
    side: THREE.BackSide,
    uniforms: {},
    vertexShader: `varying vec3 vPos; void main(){ vPos = position; gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0); }`,
    fragmentShader: `varying vec3 vPos; void main(){ float h = normalize(vPos).y; vec3 col = mix(vec3(0.08,0.02,0.03), vec3(0.02,0.02,0.06), clamp(h+0.3,0.0,1.0)); gl_FragColor = vec4(col,1.0); }`
  });
  scene.add(new THREE.Mesh(skyGeo, skyMat));

  // Events
  document.addEventListener('keydown', onKey);
  document.addEventListener('keyup', onKeyUp);
  document.addEventListener('mousedown', () => { mouseDown = true; });
  document.addEventListener('mouseup', () => { mouseDown = false; });
  window.addEventListener('resize', () => {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
  });

  // Weapon init
  switchWeapon(0);

  // Spawn wave 1
  spawnWave();
}

function buildLevel() {
  // Ground — dark concrete
  const groundGeo = new THREE.PlaneGeometry(400, 400);
  const groundMat = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.9, metalness: 0.1 });
  const ground = new THREE.Mesh(groundGeo, groundMat);
  ground.rotation.x = -Math.PI / 2;
  ground.receiveShadow = true;
  scene.add(ground);

  // Grid overlay
  const gridHelper = new THREE.GridHelper(400, 80, 0x331111, 0x1a0808);
  scene.add(gridHelper);

  // Buildings — procedural city blocks
  const bMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.8, metalness: 0.2 });
  const bMatDark = new THREE.MeshStandardMaterial({ color: 0x181818, roughness: 0.9, metalness: 0.1 });
  const bMatRed = new THREE.MeshStandardMaterial({ color: 0x331111, roughness: 0.7, metalness: 0.3 });

  const mats = [bMat, bMatDark, bMatRed];

  // Perimeter walls
  for (let i = -180; i <= 180; i += 30) {
    addBuilding(i, -190, 10 + Math.random() * 30, 20 + Math.random() * 20, mats);
    addBuilding(i, 190, 10 + Math.random() * 30, 20 + Math.random() * 20, mats);
    addBuilding(-190, i, 10 + Math.random() * 30, 20 + Math.random() * 20, mats);
    addBuilding(190, i, 10 + Math.random() * 30, 20 + Math.random() * 20, mats);
  }

  // Interior buildings — corridors and cover
  for (let i = 0; i < 40; i++) {
    const x = (Math.random() - 0.5) * 300;
    const z = (Math.random() - 0.5) * 300;
    // Don't place too close to spawn
    if (Math.abs(x) < 20 && Math.abs(z) < 20) continue;
    const h = 8 + Math.random() * 35;
    const w = 6 + Math.random() * 18;
    addBuilding(x, z, h, w, mats);
  }

  // Barricades / cover objects
  const barMat = new THREE.MeshStandardMaterial({ color: 0x444433, roughness: 1.0 });
  for (let i = 0; i < 30; i++) {
    const geo = new THREE.BoxGeometry(3 + Math.random() * 4, 1.5 + Math.random() * 2, 1 + Math.random() * 2);
    const bar = new THREE.Mesh(geo, barMat);
    bar.position.set((Math.random() - 0.5) * 250, geo.parameters.height / 2, (Math.random() - 0.5) * 250);
    bar.castShadow = true;
    bar.receiveShadow = true;
    scene.add(bar);
    buildings.push(bar);
  }

  // Red flag poles
  const poleMat = new THREE.MeshStandardMaterial({ color: 0x888888, metalness: 0.8 });
  const flagMat = new THREE.MeshStandardMaterial({ color: 0xc41e3a, emissive: 0x440000 });
  for (let i = 0; i < 8; i++) {
    const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.15, 20), poleMat);
    pole.position.set((Math.random() - 0.5) * 200, 10, (Math.random() - 0.5) * 200);
    scene.add(pole);
    const flag = new THREE.Mesh(new THREE.PlaneGeometry(4, 2.5), flagMat);
    flag.position.copy(pole.position);
    flag.position.y = 18;
    flag.position.x += 2;
    scene.add(flag);
  }
}

function addBuilding(x, z, h, w, mats) {
  const mat = mats[Math.floor(Math.random() * mats.length)];
  const d = w * (0.5 + Math.random() * 0.5);
  const geo = new THREE.BoxGeometry(w, h, d);
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(x, h / 2, z);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  scene.add(mesh);
  buildings.push(mesh);
}

// ── Weapon System ────────────────────────────────────────
function switchWeapon(idx) {
  curWeapon = idx;
  const w = WEAPONS[idx];
  ammo = w.mag;
  reserve = w.reserve;
  reloading = false;
  updateHUD();
}

function reload() {
  if (reloading) return;
  const w = WEAPONS[curWeapon];
  if (ammo >= w.mag || reserve <= 0) return;
  reloading = true;
  sfxReload();
  setTimeout(() => {
    const need = w.mag - ammo;
    const give = Math.min(need, reserve);
    ammo += give;
    reserve -= give;
    reloading = false;
    updateHUD();
  }, 1200);
}

function fire(time) {
  if (reloading || !playing) return;
  const w = WEAPONS[curWeapon];
  if (time - lastFire < w.fireRate * 1000) return;
  if (ammo <= 0) { reload(); return; }

  lastFire = time;
  ammo--;
  sfxShoot();
  updateHUD();

  // Projectile
  const dir = new THREE.Vector3();
  controls.getDirection(dir);
  dir.x += (Math.random() - 0.5) * w.spread;
  dir.y += (Math.random() - 0.5) * w.spread;
  dir.normalize();

  const geo = new THREE.SphereGeometry(0.15, 4, 4);
  const mat = new THREE.MeshBasicMaterial({ color: w.projColor });
  const proj = new THREE.Mesh(geo, mat);
  proj.position.copy(controls.getObject().position);
  proj.position.add(dir.clone().multiplyScalar(2));
  scene.add(proj);

  // Tracer light
  const tracer = new THREE.PointLight(w.projColor, 0.5, 15);
  proj.add(tracer);

  projectiles.push({ mesh: proj, dir: dir, speed: w.projSpeed, dmg: w.damage, life: 120 });

  // Muzzle flash
  const flash = new THREE.PointLight(0xffaa44, 2, 10);
  flash.position.copy(controls.getObject().position);
  flash.position.add(dir.clone().multiplyScalar(3));
  scene.add(flash);
  setTimeout(() => scene.remove(flash), 50);
}

// ── Enemy System ─────────────────────────────────────────
function spawnEnemy(x, z) {
  const ex = x !== undefined ? x : (Math.random() - 0.5) * 350;
  const ez = z !== undefined ? z : (Math.random() - 0.5) * 350;

  // Don't spawn on top of player
  const pp = controls.getObject().position;
  if (Math.abs(ex - pp.x) < 30 && Math.abs(ez - pp.z) < 30) return spawnEnemy();

  const bodyGeo = new THREE.CylinderGeometry(0.8, 0.8, 4, 8);
  const headGeo = new THREE.SphereGeometry(0.6, 8, 8);
  const bodyMat = new THREE.MeshStandardMaterial({ color: 0x882222, emissive: 0x220000, roughness: 0.6 });
  const headMat = new THREE.MeshStandardMaterial({ color: 0xcc9977, roughness: 0.8 });

  const group = new THREE.Group();
  const body = new THREE.Mesh(bodyGeo, bodyMat);
  body.position.y = 2;
  body.castShadow = true;
  group.add(body);

  const head = new THREE.Mesh(headGeo, headMat);
  head.position.y = 4.5;
  head.castShadow = true;
  group.add(head);

  // Eyes — glowing red
  const eyeMat = new THREE.MeshBasicMaterial({ color: 0xff0000 });
  const eyeGeo = new THREE.SphereGeometry(0.1, 4, 4);
  const eyeL = new THREE.Mesh(eyeGeo, eyeMat);
  eyeL.position.set(-0.2, 4.6, 0.5);
  group.add(eyeL);
  const eyeR = new THREE.Mesh(eyeGeo, eyeMat);
  eyeR.position.set(0.2, 4.6, 0.5);
  group.add(eyeR);

  // Enemy glow
  const glow = new THREE.PointLight(0xff2222, 0.3, 15);
  glow.position.y = 3;
  group.add(glow);

  group.position.set(ex, 0, ez);
  // Commies are weak — low HP, panic easily, stumble around
  const isCoward = Math.random() < 0.6; // 60% are cowards
  const isPanicked = Math.random() < 0.4; // 40% panic and run sideways
  group.userData = {
    hp: 15 + wave * 5, // weak — go down fast
    speed: 3 + Math.random() * 5 + wave * 0.5, // slow and pathetic
    attackTimer: 0,
    attackRate: 2.5 - Math.min(wave * 0.05, 1.0), // slow to attack — hesitant
    isCoward: isCoward,
    isPanicked: isPanicked,
    stumbleTimer: 0,
    stumbleDir: new THREE.Vector3((Math.random()-0.5)*2, 0, (Math.random()-0.5)*2).normalize(),
    fleeThreshold: 0.3 + Math.random() * 0.4, // HP% at which they run away
    wobble: Math.random() * Math.PI * 2, // wobbly walk phase
  };

  scene.add(group);
  enemies.push(group);
}

function spawnWave() {
  const count = 8 + wave * 4;
  const wb = document.getElementById('wave-banner');
  wb.querySelector('h2').textContent = 'WAVE ' + wave;
  wb.querySelector('p').textContent = count + ' hostiles inbound';
  wb.style.opacity = '1';
  sfxWave();
  setTimeout(() => { wb.style.opacity = '0'; }, 3000);

  for (let i = 0; i < count; i++) {
    setTimeout(() => spawnEnemy(), i * 300);
  }
}

// ── Particles ────────────────────────────────────────────
function spawnParticles(pos, color, count) {
  for (let i = 0; i < count; i++) {
    const geo = new THREE.SphereGeometry(0.1 + Math.random() * 0.15, 4, 4);
    const mat = new THREE.MeshBasicMaterial({ color: color });
    const p = new THREE.Mesh(geo, mat);
    p.position.copy(pos);
    const vel = new THREE.Vector3(
      (Math.random() - 0.5) * 15,
      Math.random() * 10,
      (Math.random() - 0.5) * 15
    );
    scene.add(p);
    particles.push({ mesh: p, vel: vel, life: 40 + Math.random() * 30 });
  }
}

// ── HUD ──────────────────────────────────────────────────
function updateHUD() {
  document.getElementById('hp-val').textContent = Math.max(0, health);
  document.getElementById('hp-bar').style.width = Math.max(0, health) + '%';
  document.getElementById('hp-bar').style.background = health > 50 ? '#22c55e' : health > 25 ? '#fbbf24' : '#ef4444';
  document.getElementById('hp-val').style.color = health > 50 ? '#22c55e' : health > 25 ? '#fbbf24' : '#ef4444';
  document.getElementById('ammo-val').textContent = ammo;
  document.getElementById('ammo-reserve').textContent = reserve;
  document.getElementById('wep-name').textContent = WEAPONS[curWeapon].name;
  document.getElementById('wave-val').textContent = wave;
  document.getElementById('score-val').textContent = score;
  document.getElementById('kills-val').textContent = kills;
}

function addKillMsg(msg) {
  const el = document.createElement('div');
  el.className = 'kill-msg';
  el.textContent = msg;
  document.getElementById('killfeed').appendChild(el);
  setTimeout(() => { if (el.parentNode) el.remove(); }, 3000);
}

// ── Input ────────────────────────────────────────────────
function onKey(e) {
  switch (e.code) {
    case 'KeyW': case 'ArrowUp': moveF = true; break;
    case 'KeyA': case 'ArrowLeft': moveL = true; break;
    case 'KeyS': case 'ArrowDown': moveB = true; break;
    case 'KeyD': case 'ArrowRight': moveR = true; break;
    case 'Space': if (canJump) { velocity.y = 180; canJump = false; } break;
    case 'KeyR': reload(); break;
    case 'Digit1': switchWeapon(0); break;
    case 'Digit2': switchWeapon(1); break;
    case 'Digit3': switchWeapon(2); break;
  }
}
function onKeyUp(e) {
  switch (e.code) {
    case 'KeyW': case 'ArrowUp': moveF = false; break;
    case 'KeyA': case 'ArrowLeft': moveL = false; break;
    case 'KeyS': case 'ArrowDown': moveB = false; break;
    case 'KeyD': case 'ArrowRight': moveR = false; break;
  }
}

// ── Game Loop ────────────────────────────────────────────
function gameLoop(time) {
  requestAnimationFrame(gameLoop);
  if (!playing) { renderer.render(scene, camera); return; }

  const delta = Math.min((time - prevTime) / 1000, 0.05);
  prevTime = time;

  // ── Player Movement ─────────────────────
  velocity.x -= velocity.x * 10 * delta;
  velocity.z -= velocity.z * 10 * delta;
  velocity.y -= 9.8 * 80 * delta;

  direction.z = Number(moveF) - Number(moveB);
  direction.x = Number(moveR) - Number(moveL);
  direction.normalize();

  const speed = 600;
  if (moveF || moveB) velocity.z -= direction.z * speed * delta;
  if (moveL || moveR) velocity.x -= direction.x * speed * delta;

  controls.moveRight(-velocity.x * delta);
  controls.moveForward(-velocity.z * delta);
  controls.getObject().position.y += velocity.y * delta;

  if (controls.getObject().position.y < 5) {
    velocity.y = 0;
    controls.getObject().position.y = 5;
    canJump = true;
  }

  // Clamp to level bounds
  const pos = controls.getObject().position;
  pos.x = Math.max(-195, Math.min(195, pos.x));
  pos.z = Math.max(-195, Math.min(195, pos.z));

  // ── Auto-fire ───────────────────────────
  if (mouseDown && controls.isLocked) {
    const w = WEAPONS[curWeapon];
    if (w.auto || time - lastFire > w.fireRate * 1000 * 2) {
      fire(time);
    }
  }

  // ── Projectile Update ───────────────────
  for (let i = projectiles.length - 1; i >= 0; i--) {
    const p = projectiles[i];
    p.mesh.position.add(p.dir.clone().multiplyScalar(p.speed * delta));
    p.life--;

    let hit = false;
    for (let j = enemies.length - 1; j >= 0; j--) {
      const e = enemies[j];
      if (p.mesh.position.distanceTo(e.position) < 3) {
        e.userData.hp -= p.dmg;
        spawnParticles(p.mesh.position, 0xff4444, 5);
        sfxHit();

        // Blood spray on hit
        spawnParticles(p.mesh.position.clone(), 0x880000, 3);

        if (e.userData.hp <= 0) {
          // DEATH — massive blood explosion
          const deathPos = e.position.clone().add(new THREE.Vector3(0, 2, 0));
          spawnParticles(deathPos, 0xff0000, 25);
          spawnParticles(deathPos, 0x880000, 15);
          spawnParticles(deathPos, 0x440000, 10);
          // Blood pool on ground
          const poolGeo = new THREE.CircleGeometry(1.5 + Math.random(), 8);
          const poolMat = new THREE.MeshBasicMaterial({ color: 0x440000, transparent: true, opacity: 0.7 });
          const pool = new THREE.Mesh(poolGeo, poolMat);
          pool.rotation.x = -Math.PI / 2;
          pool.position.set(e.position.x, 0.05, e.position.z);
          scene.add(pool);
          // Death sound — heavier
          playSound(80, 0.3, 'sawtooth', 0.3);
          playSound(40, 0.4, 'square', 0.2);
          scene.remove(e);
          enemies.splice(j, 1);
          kills++;
          score += 100 + wave * 25;
          addKillMsg(KILL_MESSAGES[Math.floor(Math.random() * KILL_MESSAGES.length)]);
        } else {
          // Hit stagger — enemy flinches backward
          const knockback = p.dir.clone().multiplyScalar(3);
          e.position.add(knockback);
        }
        hit = true;
        break;
      }
    }

    if (hit || p.life <= 0) {
      scene.remove(p.mesh);
      projectiles.splice(i, 1);
    }
  }

  // ── Enemy AI — weak, cowardly, stumbling ─
  const pPos = controls.getObject().position;
  enemies.forEach(e => {
    const ud = e.userData;
    const toPlayer = pPos.clone().sub(e.position);
    const dist = toPlayer.length();
    toPlayer.normalize();

    // Face player (wobble when walking)
    ud.wobble += delta * (3 + Math.random());
    e.lookAt(pPos.x, e.position.y, pPos.z);

    // Wobble — they can't walk straight
    const wobbleX = Math.sin(ud.wobble) * 0.8;
    e.rotation.z = Math.sin(ud.wobble * 1.5) * 0.15; // body sway

    // HP ratio for flee check
    const hpRatio = ud.hp / (15 + wave * 5);

    // Cowards flee when hurt
    if (ud.isCoward && hpRatio < ud.fleeThreshold) {
      // Run AWAY from player — stumbling
      const fleeDir = toPlayer.clone().negate();
      fleeDir.x += Math.sin(ud.wobble * 2) * 0.5; // stumble sideways
      e.position.add(fleeDir.multiplyScalar(ud.speed * 1.3 * delta));
      e.position.y = 0;
      return; // cowards don't attack when fleeing
    }

    // Panicked ones run sideways randomly, then charge
    if (ud.isPanicked) {
      ud.stumbleTimer -= delta;
      if (ud.stumbleTimer <= 0) {
        ud.stumbleDir = new THREE.Vector3((Math.random()-0.5)*2, 0, (Math.random()-0.5)*2).normalize();
        ud.stumbleTimer = 0.8 + Math.random() * 1.5;
      }
      // Mix: 60% toward player, 40% random stumble
      const moveDir = toPlayer.clone().multiplyScalar(0.6).add(ud.stumbleDir.clone().multiplyScalar(0.4));
      if (dist > 4) {
        e.position.add(moveDir.normalize().multiplyScalar(ud.speed * delta));
        e.position.x += wobbleX * delta; // stumble
        e.position.y = 0;
      }
    } else {
      // Regular weak approach — slow, hesitant
      if (dist > 4) {
        // Pause randomly — they're scared
        if (Math.random() > 0.02) { // 2% chance to freeze in fear each frame
          e.position.add(toPlayer.multiplyScalar(ud.speed * delta));
          e.position.x += wobbleX * delta;
        }
        e.position.y = 0;
      }
    }

    // Attack — weak, slow, hesitant
    ud.attackTimer -= delta;
    if (dist < 6 && ud.attackTimer <= 0) {
      health -= 4 + wave; // weak hits
      ud.attackTimer = ud.attackRate;
      sfxDamage();
      document.getElementById('damage').style.opacity = '0.4';
      setTimeout(() => document.getElementById('damage').style.opacity = '0', 150);
      updateHUD();

      if (health <= 0) {
        gameOver();
        return;
      }
    }
  });

  // ── Wave check ──────────────────────────
  if (enemies.length === 0) {
    wave++;
    health = Math.min(100, health + 20);
    spawnWave();
    updateHUD();
  }

  // ── Particles ───────────────────────────
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.vel.y -= 20 * delta;
    p.mesh.position.add(p.vel.clone().multiplyScalar(delta));
    p.life--;
    if (p.life <= 0 || p.mesh.position.y < 0) {
      scene.remove(p.mesh);
      particles.splice(i, 1);
    }
  }

  // ── Fire light flicker ──────────────────
  scene.children.forEach(c => {
    if (c.isPointLight && c._baseIntensity) {
      c.intensity = c._baseIntensity + Math.sin(time * 0.005 + c._phase) * 0.3;
    }
  });

  updateHUD();
  renderer.render(scene, camera);
}

function gameOver() {
  playing = false;
  controls.unlock();
  document.getElementById('gameover').style.display = 'flex';
  document.getElementById('go-stats').innerHTML =
    'Waves Survived: <strong>' + (wave - 1) + '</strong><br>' +
    'Treason Liquidated: <strong>' + kills + '</strong><br>' +
    'Final Score: <strong>' + score + '</strong>';
}

// ── Start ────────────────────────────────────────────────
function startGame() {
  initAudio();
  initGame();
  document.getElementById('blocker').style.display = 'none';
  controls.lock();
  controls.addEventListener('lock', () => { playing = true; });
  controls.addEventListener('unlock', () => {
    if (health > 0) {
      playing = false;
      document.getElementById('blocker').style.display = 'flex';
    }
  });
  document.addEventListener('click', () => {
    if (!controls.isLocked && health > 0) controls.lock();
    if (controls.isLocked && !WEAPONS[curWeapon].auto) fire(performance.now());
  });
  playing = true;
  prevTime = performance.now();
  requestAnimationFrame(gameLoop);
}
</script>
</body>
</html>
