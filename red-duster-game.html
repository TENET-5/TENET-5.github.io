<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>RED DUSTER — TENET5</title>
<style>
*{margin:0;padding:0}body{background:#000;overflow:hidden;font-family:monospace}
canvas{display:block}
#ui{position:fixed;inset:0;pointer-events:none;z-index:10;color:#fff;font-family:monospace}
#splash{position:fixed;inset:0;z-index:20;background:#1a0000;display:flex;align-items:center;justify-content:center;cursor:pointer;border:4px solid #c41e3a}
#splash div{text-align:center}
#splash h1{font-size:4em;color:#c41e3a;letter-spacing:8px;text-shadow:0 0 30px #c41e3a}
#splash p{color:#888;margin:20px 0}
#splash .go{font-size:1.5em;color:#f44;animation:p 1.5s infinite}
@keyframes p{0%,100%{opacity:1}50%{opacity:.3}}
#cross{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);color:rgba(255,255,255,.5);font-size:24px;z-index:11;pointer-events:none}
#stats{position:fixed;bottom:20px;left:20px;font-size:18px;z-index:11;pointer-events:none}
#ammo{position:fixed;bottom:20px;right:20px;font-size:20px;z-index:11;pointer-events:none}
#wave{position:fixed;top:20px;width:100%;text-align:center;font-size:16px;color:#c41e3a;letter-spacing:4px;z-index:11;pointer-events:none}
#hit{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:36px;color:#ff0;z-index:12;pointer-events:none;opacity:0}
#hurt{position:fixed;inset:0;pointer-events:none;z-index:9;opacity:0;background:radial-gradient(transparent 40%,rgba(255,0,0,.4));transition:opacity .15s}
#dead{position:fixed;inset:0;z-index:30;background:rgba(0,0,0,.9);display:none;align-items:center;justify-content:center;flex-direction:column;cursor:pointer}
#dead h1{font-size:5em;color:#c41e3a}
#dead p{color:#888;margin-top:20px}
</style>
</head>
<body>
<div id="splash" onclick="go()"><div>
<h1>RED DUSTER</h1>
<p>Anti-Communist Training Simulator</p>
<p style="color:#555;font-size:.8em">WASD move | Mouse aim | Click shoot | R reload | Shift sprint</p>
<p class="go">[ CLICK TO PLAY ]</p>
<p style="color:#333;font-size:.65em">* The communists in this simulator are fictional but modeled on real communists.</p>
</div></div>
<div id="ui">
<div id="cross">+</div>
<div id="stats">HP: 100 | KILLS: 0</div>
<div id="ammo">C7A2 | 30</div>
<div id="wave">WAVE 1</div>
<div id="hit"></div>
<div id="hurt"></div>
</div>
<div id="dead" onclick="location.reload()"><h1>K.I.A.</h1><p id="final"></p><p style="color:#666">Click to redeploy</p></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script>
var S,C,R,clk,hp=100,ammo=30,kills=0,wv=0,alive=1,on=0,reload=0,lastF=0,md=0;
var en=[],gibs=[];
var fw=0,bk=0,lt=0,rt=0,sp=0;
var actx;

function snd(t){
if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();
var o=actx.createOscillator(),g=actx.createGain();
o.connect(g);g.connect(actx.destination);var n=actx.currentTime;
if(t=='s'){o.type='square';o.frequency.setValueAtTime(120,n);o.frequency.exponentialRampToValueAtTime(30,n+.07);g.gain.setValueAtTime(.4,n);g.gain.exponentialRampToValueAtTime(.01,n+.07);o.start(n);o.stop(n+.07)}
if(t=='h'){o.type='triangle';o.frequency.setValueAtTime(3e3,n);o.frequency.exponentialRampToValueAtTime(500,n+.06);g.gain.setValueAtTime(.6,n);g.gain.exponentialRampToValueAtTime(.01,n+.06);o.start(n);o.stop(n+.06)}
if(t=='d'){o.type='sine';o.frequency.setValueAtTime(40,n);o.frequency.linearRampToValueAtTime(15,n+.3);g.gain.setValueAtTime(.6,n);g.gain.exponentialRampToValueAtTime(.01,n+.3);o.start(n);o.stop(n+.3)}
}

function go(){
document.getElementById('splash').style.display='none';
S=new THREE.Scene();
S.background=new THREE.Color(0x080810);
S.fog=new THREE.FogExp2(0x080810,.015);
C=new THREE.PerspectiveCamera(80,innerWidth/innerHeight,.1,200);
C.position.set(0,1.7,0);
R=new THREE.WebGLRenderer({antialias:true});
R.setSize(innerWidth,innerHeight);
R.setPixelRatio(Math.min(devicePixelRatio,2));
R.shadowMap.enabled=true;
document.body.appendChild(R.domElement);
clk=new THREE.Clock();

// Light
S.add(new THREE.AmbientLight(0x556677,.7));
var sun=new THREE.DirectionalLight(0x8899bb,1);
sun.position.set(50,100,30);sun.castShadow=true;
sun.shadow.mapSize.set(1024,1024);
var d=60;sun.shadow.camera.left=-d;sun.shadow.camera.right=d;sun.shadow.camera.top=d;sun.shadow.camera.bottom=-d;
S.add(sun);
S.add(new THREE.HemisphereLight(0x2244aa,0x221100,.3));
for(var i=0;i<6;i++){var pl=new THREE.PointLight(0xff2200,2,25);pl.position.set((Math.random()-.5)*80,5,(Math.random()-.5)*80);S.add(pl)}

// Ground
var gnd=new THREE.Mesh(new THREE.PlaneGeometry(200,200),new THREE.MeshStandardMaterial({color:0x2a2a26,roughness:.9}));
gnd.rotation.x=-Math.PI/2;gnd.receiveShadow=true;S.add(gnd);

// Buildings
var wm=new THREE.MeshStandardMaterial({color:0x5a3a22,roughness:.85});
var cm=new THREE.MeshStandardMaterial({color:0x444446,roughness:.9});
for(var gx=-3;gx<=3;gx++)for(var gz=-3;gz<=3;gz++){
if(Math.abs(gx)<=1&&Math.abs(gz)<=1)continue;
if(Math.random()<.25)continue;
var w=6+Math.random()*10,dd=6+Math.random()*10,h=3+Math.random()*8;
var b=new THREE.Mesh(new THREE.BoxGeometry(w,h,dd),wm);
b.position.set(gx*20+(Math.random()-.5)*4,h/2,gz*20+(Math.random()-.5)*4);
b.castShadow=true;b.receiveShadow=true;S.add(b);
}
for(var i=0;i<40;i++){
var s=.8+Math.random()*2;
var c=new THREE.Mesh(new THREE.BoxGeometry(s,s,s),cm);
c.position.set((Math.random()-.5)*80,s/2,(Math.random()-.5)*80);
c.castShadow=true;S.add(c);
}

// Lock pointer
R.domElement.requestPointerLock();
document.addEventListener('pointerlockchange',function(){
if(!document.pointerLockElement&&on&&alive)document.getElementById('splash').style.display='flex';
});

// Mouse
var yaw=0,pitch=0;
document.addEventListener('mousemove',function(e){
if(!on||!alive)return;
yaw-=e.movementX*.002;
pitch-=e.movementY*.002;
pitch=Math.max(-1.5,Math.min(1.5,pitch));
});

// Keys
document.addEventListener('keydown',function(e){
if(e.code=='KeyW')fw=1;if(e.code=='KeyS')bk=1;if(e.code=='KeyA')lt=1;if(e.code=='KeyD')rt=1;
if(e.code=='ShiftLeft')sp=1;
if(e.code=='KeyR'&&!reload&&ammo<30){reload=1;setTimeout(function(){ammo=30;reload=0;hud()},2e3)}
});
document.addEventListener('keyup',function(e){
if(e.code=='KeyW')fw=0;if(e.code=='KeyS')bk=0;if(e.code=='KeyA')lt=0;if(e.code=='KeyD')rt=0;
if(e.code=='ShiftLeft')sp=0;
});
document.addEventListener('mousedown',function(){md=1});
document.addEventListener('mouseup',function(){md=0});
window.addEventListener('resize',function(){C.aspect=innerWidth/innerHeight;C.updateProjectionMatrix();R.setSize(innerWidth,innerHeight)});

on=1;
wave();

function wave(){
wv++;
var ct=Math.min(30,5+wv*3);
for(var i=0;i<ct;i++){
var a=Math.random()*Math.PI*2,r=25+Math.random()*40;
spawnE(Math.cos(a)*r,Math.sin(a)*r);
}
document.getElementById('wave').textContent='WAVE '+wv;
}

function spawnE(x,z){
var g=new THREE.Group();
var bm=new THREE.MeshStandardMaterial({color:0x662222});
var hm=new THREE.MeshStandardMaterial({color:0x886655});
var t=new THREE.Mesh(new THREE.BoxGeometry(.5,.8,.35),bm);t.position.y=1.1;t.castShadow=true;g.add(t);
var hd=new THREE.Mesh(new THREE.SphereGeometry(.17,6,5),hm);hd.position.y=1.7;hd.castShadow=true;hd.userData.head=1;g.add(hd);
var lm=new THREE.MeshStandardMaterial({color:0x2a2a22});
g.add(Object.assign(new THREE.Mesh(new THREE.BoxGeometry(.16,.6,.2),lm),{position:new THREE.Vector3(-.12,.3,0)}));
g.add(Object.assign(new THREE.Mesh(new THREE.BoxGeometry(.16,.6,.2),lm),{position:new THREE.Vector3(.12,.3,0)}));
g.position.set(x,0,z);S.add(g);
en.push({m:g,hp:25+wv*5,x:x,z:z,spd:1.8+Math.random()*1.5,lf:0});
}

function shoot(){
if(!alive||reload||ammo<=0)return;
var now=performance.now();
if(now-lastF<100)return;
lastF=now;ammo--;snd('s');

var rc=new THREE.Raycaster();
rc.setFromCamera(new THREE.Vector2(0,0),C);
var ms=[];en.forEach(function(e){e.m.traverse(function(c){if(c.isMesh){c.userData.er=e;ms.push(c)}})});
var hits=rc.intersectObjects(ms);
if(hits.length>0){
var e=hits[0].object.userData.er;
if(e&&e.hp>0){
var hs=hits[0].object.userData.head;
e.hp-=hs?100:35;
snd('h');
var hm=document.getElementById('hit');hm.textContent=hs?'☠':'✕';hm.style.color=hs?'#ff0':'#f33';hm.style.opacity=1;
setTimeout(function(){hm.style.opacity=0},80);
if(e.hp<=0)killE(e);
}
}
hud();
}

function killE(e){
kills++;
var p=e.m.position;
for(var i=0;i<10;i++){
var sz=.04+Math.random()*.06;
var gb=new THREE.Mesh(new THREE.BoxGeometry(sz,sz,sz),new THREE.MeshBasicMaterial({color:i<5?0xaa0000:0x553322}));
gb.position.set(p.x+(Math.random()-.5)*.3,1+Math.random(),p.z+(Math.random()-.5)*.3);
S.add(gb);
gibs.push({m:gb,vx:(Math.random()-.5)*6,vy:2+Math.random()*5,vz:(Math.random()-.5)*6,t:2+Math.random()*2});
}
snd('d');S.remove(e.m);en.splice(en.indexOf(e),1);
hud();
if(en.length==0)setTimeout(wave,2e3);
}

function hud(){
document.getElementById('stats').textContent='HP: '+Math.max(0,Math.round(hp))+' | KILLS: '+kills;
document.getElementById('ammo').textContent='C7A2 | '+ammo;
}

var regen=0;
(function loop(){
requestAnimationFrame(loop);
var dt=Math.min(clk.getDelta(),.05);
if(!on||!alive){R.render(S,C);return}

// Camera
C.rotation.order='YXZ';
C.rotation.y=yaw;
C.rotation.x=pitch;

// Move
var spd=sp?28:15;
var dx=0,dz=0;
if(fw){dx-=Math.sin(yaw)*spd*dt;dz-=Math.cos(yaw)*spd*dt}
if(bk){dx+=Math.sin(yaw)*spd*dt;dz+=Math.cos(yaw)*spd*dt}
if(lt){dx-=Math.cos(yaw)*spd*dt;dz+=Math.sin(yaw)*spd*dt}
if(rt){dx+=Math.cos(yaw)*spd*dt;dz-=Math.sin(yaw)*spd*dt}
C.position.x=Math.max(-95,Math.min(95,C.position.x+dx));
C.position.z=Math.max(-95,Math.min(95,C.position.z+dz));
C.position.y=1.7;

// Auto fire
if(md)shoot();

// Enemy AI
var px=C.position.x,pz=C.position.z;
en.forEach(function(e){
var ddx=px-e.x,ddz=pz-e.z,dist=Math.sqrt(ddx*ddx+ddz*ddz);
if(dist<.1)return;
var nx=ddx/dist,nz=ddz/dist;
e.m.lookAt(px,1,pz);
if(dist>8){e.x+=nx*e.spd*dt;e.z+=nz*e.spd*dt}
else{var st=Math.sin(performance.now()*.002+e.x)*e.spd*.3*dt;e.x+=-nz*st;e.z+=nx*st}
e.m.position.x=e.x;e.m.position.z=e.z;
// Shoot
var now=performance.now();
if(dist<40&&now-e.lf>1500+Math.random()*2e3){e.lf=now;
if(Math.random()>.15){hp-=3+wv*.3;regen=0;
document.getElementById('hurt').style.opacity=.6;
setTimeout(function(){document.getElementById('hurt').style.opacity=0},120);
hud();
if(hp<=0&&alive){alive=0;document.getElementById('dead').style.display='flex';document.getElementById('final').textContent='Wave '+wv+' | Kills: '+kills;document.exitPointerLock()}
}}
});

// Gibs
for(var i=gibs.length-1;i>=0;i--){
var g=gibs[i];g.m.position.x+=g.vx*dt;g.vy-=14*dt;g.m.position.y+=g.vy*dt;g.m.position.z+=g.vz*dt;
g.m.rotation.x+=5*dt;g.m.rotation.z+=3*dt;
if(g.m.position.y<.02){g.m.position.y=.02;g.vy=Math.abs(g.vy)*.2;g.vx*=.5;g.vz*=.5}
g.t-=dt;if(g.t<=0){S.remove(g.m);gibs.splice(i,1)}
}

// Regen
regen+=dt;if(regen>3&&hp<100){hp=Math.min(100,hp+5*dt);hud()}

R.render(S,C);
})();
}
</script>
</body>
</html>
